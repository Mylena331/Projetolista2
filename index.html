<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tela Inicial</title>

<style>

body{
font-family: Arial;
background-color: #f2f2f2;
display: flex;
justify-content: center;
}

.container{
width: 320px;
background: white;
padding: 25px;
border-radius: 12px;
margin-top: 60px;
box-shadow: 0px 0px 10px #ccc;
}

h1{
text-align: center;
margin-bottom: 20px;
}

input, textarea, select{
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 8px;
border: 1px solid #ccc;
box-sizing: border-box;
}

button{
width: 100%;
padding: 12px;
margin-top: 15px;
border: none;
border-radius: 8px;
background-color: #774caf;
color: white;
font-size: 16px;
cursor: pointer;
}

button:hover{
background-color: #774caf;
}

p{
text-align: center;
margin-top: 15px;
}

a{
text-decoration: none;
}

.tarefa{
border: 1px solid #ccc;
padding: 12px;
border-radius: 10px;
margin-top: 15px;
}

</style>
</head>
<body>

<div class="container">

<h1>Lista de Tarefas</h1>

<a href="tarefas.html">
<button>Entrar no Sistema</button>
</a>

</div>

</body>
</html>
